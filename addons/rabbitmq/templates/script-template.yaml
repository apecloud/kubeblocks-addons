apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rabbitmq.cmScriptsName" . }}
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
data:
  startup.sh: |-
    {{- .Files.Get "scripts/startup.sh" | nindent 4 }}
  account-provision.sh: |-
    {{- .Files.Get "scripts/account-provision.sh" | nindent 4 }}
