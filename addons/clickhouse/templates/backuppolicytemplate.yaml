apiVersion: dataprotection.kubeblocks.io/v1alpha1
kind: BackupPolicyTemplate
metadata:
  name: clickhouse-backup-policy-template
  labels:
    clusterdefinition.kubeblocks.io/name: clickhouse
spec:
  serviceKind: Clickhouse
  compDefs:
  - {{ include "clickhouse.cmpdRegexpPattern" . }}
  target:
    account: admin
    role: ""
    strategy: Any
    useParentSelectedPods: true
  backupMethods:
    - name: full
      snapshotVolumes: false
      actionSetName: clickhouse-full-backup
      targetVolumes:
        volumeMounts:
          - name: data
            mountPath: /bitnami/clickhouse
          - name: tls
            mountPath: /etc/pki/tls
          - name: client-config
            mountPath: /etc/clickhouse-client
          - name: config
            mountPath: /opt/bitnami/clickhouse/etc/conf.d
    - name: incremental
      compatibleMethod: full
      actionSetName: clickhouse-incremental-backup
      targetVolumes:
        volumeMounts:
          - name: data
            mountPath: /bitnami/clickhouse
          - name: tls
            mountPath: /etc/pki/tls
          - name: client-config
            mountPath: /etc/clickhouse-client
          - name: config
            mountPath: /opt/bitnami/clickhouse/etc/conf.d
  schedules:
    - backupMethod: full
      enabled: {{ .Values.backup.enabled }}
      cronExpression: {{ .Values.backup.fullSchedule | quote }}
      retentionPeriod: {{ .Values.backup.fullRetentionPeriod }}
    - backupMethod: incremental
      enabled: {{ .Values.backup.enabled }}
      cronExpression: {{ .Values.backup.incrementalSchedule | quote }}
      retentionPeriod: {{ .Values.backup.incrementalRetentionPeriod }}