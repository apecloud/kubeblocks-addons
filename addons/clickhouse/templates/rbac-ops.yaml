---
# ServiceAccount + RBAC for OpsDefinition workloads that need to patch Kubernetes Secrets
# (e.g., rotate-password-clickhouse OpsDefinition)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "clickhouse.fullname" . }}-ops-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickhouse.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "clickhouse.fullname" . }}-ops-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickhouse.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "clickhouse.fullname" . }}-ops-rb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "clickhouse.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "clickhouse.fullname" . }}-ops-role
subjects:
  - kind: ServiceAccount
    name: {{ include "clickhouse.fullname" . }}-ops-sa
    namespace: {{ .Release.Namespace }}
  # KubeBlocks automatically creates a SA named kb-{cmpdName} for OpsDefinition workload pods.
  # Grant it the same permissions so rotate-password can patch Secrets.
  - kind: ServiceAccount
    name: kb-{{ include "clickhouse.cmpdName" . }}
    namespace: {{ .Release.Namespace }}
