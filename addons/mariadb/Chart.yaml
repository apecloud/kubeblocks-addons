#      @'127.0.0.1'. set_remote_root_account_state still uses the
#      original CMPD_SECONDARY_FENCE_GRANT_BODY for @'%' targets.
#   2. CMPD_EXPLICIT_PRIMARY_GRANT_BODY_LOCAL: same pattern; new
