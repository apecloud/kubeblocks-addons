apiVersion: apps.kubeblocks.io/v1
kind: ComponentVersion
metadata:
  name: mariadb
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
  annotations:
    {{- include "mariadb.annotations" . | nindent 4 }}
spec:
  compatibilityRules:
    - compDefs:
        - {{ include "mariadb.standalone.cmpdRegexpPattern" . }}
        - {{ include "mariadb.replication.cmpdRegexpPattern" . }}
        - {{ include "mariadb.semisync.cmpdRegexpPattern" . }}
        # alpha.89 v1 commit 15 (Helen 2026-05-20, live N=1 first
        # blocker from vcluster `mariadb-test5` rerun) — bind the
        # merged replication CmpD to the same release set so the
        # InstanceSet gets the engine / exporter / init-syncer
        # images. Without this entry the rendered live InstanceSet
        # leaves the mariadb / exporter / init-syncer image fields
        # empty (Pod create fails with "spec.containers[*].image:
        # Required value", controller log "ImageUtil parse image
        # failed, image="""). The merged regex is more specific
        # than `^mariadb-replication-[0-9]` (matches digits only),
        # so adding the merged pattern alongside the existing three
        # does not over-match.
        - {{ include "mariadb.replication.merged.cmpdRegexpPattern" . }}
      releases:
        - 10.6.15
        - 11.4.5
        - 11.4.8
        - 11.4.10
        - 11.8.4
        - 12.0.2
    - compDefs:
        - {{ include "mariadb.galera.cmpdRegexpPattern" . }}
      releases:
        - 11.4.5
        - 11.4.8
        - 11.4.10
        - 11.8.4
        - 12.0.2
  releases:
    - name: 10.6.15
      serviceVersion: 10.6.15
      images:
        mariadb: {{ include "mariadb.repository" . }}:10.6.15
        exporter: {{ include "exporter.repository" . }}:{{ .Values.image.prom.exporter.tag }}
        init-syncer: {{ include "mariadb.syncer.image" . }}
    - name: 11.4.5
      serviceVersion: 11.4.5
      images:
        mariadb: {{ include "mariadb.repository" . }}:11.4.5
        exporter: {{ include "exporter.repository" . }}:{{ .Values.image.prom.exporter.tag }}
        init-syncer: {{ include "mariadb.syncer.image" . }}
    - name: 11.4.8
      serviceVersion: 11.4.8
      images:
        mariadb: {{ include "mariadb.repository" . }}:11.4.8
        exporter: {{ include "exporter.repository" . }}:{{ .Values.image.prom.exporter.tag }}
        init-syncer: {{ include "mariadb.syncer.image" . }}
    - name: 11.4.10
      serviceVersion: 11.4.10
      images:
        mariadb: {{ include "mariadb.repository" . }}:11.4
        exporter: {{ include "exporter.repository" . }}:{{ .Values.image.prom.exporter.tag }}
        init-syncer: {{ include "mariadb.syncer.image" . }}
    - name: 11.8.4
      serviceVersion: 11.8.4
      images:
        mariadb: {{ include "mariadb.repository" . }}:11.8.4
        exporter: {{ include "exporter.repository" . }}:{{ .Values.image.prom.exporter.tag }}
        init-syncer: {{ include "mariadb.syncer.image" . }}
    - name: 12.0.2
      serviceVersion: 12.0.2
      images:
        mariadb: {{ include "mariadb.repository" . }}:12.0.2
        exporter: {{ include "exporter.repository" . }}:{{ .Values.image.prom.exporter.tag }}
        init-syncer: {{ include "mariadb.syncer.image" . }}
