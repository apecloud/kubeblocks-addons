# ParamConfigRenderer for standalone MariaDB
apiVersion: parameters.kubeblocks.io/v1alpha1
kind: ParamConfigRenderer
metadata:
  name: {{ include "mariadb.cmpdName" . }}-pcr
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
spec:
  componentDef: {{ include "mariadb.cmpdName" . }}
  configs:
    - name: my.cnf
      templateName: mariadb-standalone-config
      fileFormatConfig:
        format: ini
        iniConfig:
          sectionName: mysqld
      reRenderResourceTypes:
        - vscale
  parametersDefs:
    - mariadb-standalone-pd

