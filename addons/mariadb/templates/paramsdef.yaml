{{- $pd := .Files.Get "config/mariadb-config-effect-scope.yaml" | fromYaml }}
# ParametersDefinition for standalone MariaDB
apiVersion: parameters.kubeblocks.io/v1alpha1
kind: ParametersDefinition
metadata:
  name: mariadb-standalone-pd
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
spec:
  componentDef: {{ include "mariadb.standalone.cmpdRegexpPattern" . | quote }}
  templateName: mariadb-standalone-config
  fileName: my.cnf
  fileFormatConfig:
    format: ini
    iniConfig:
      sectionName: mysqld
  {{- if hasKey $pd "staticParameters" }}
  staticParameters:
    {{- range (get $pd "staticParameters") }}
    - {{ . }}
    {{- end }}
  {{- end }}
  {{- if hasKey $pd "dynamicParameters" }}
  dynamicParameters:
    {{- range (get $pd "dynamicParameters") }}
    - {{ . }}
    {{- end }}
  {{- end }}

