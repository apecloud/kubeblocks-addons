# Default values for mariadb.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
image:
  registry: docker.io
  repository: mariadb
  pullPolicy: IfNotPresent
  tag: 11.4
  prom:
    pullPolicy: IfNotPresent
    exporter:
      repository: prom/mysqld-exporter
      tag: v0.14.0
  syncer:
    repository: apecloud/syncer
    # alpha.23: patched syncer for semisync switchover old-primary rejoin.
    # Built linux/amd64 and distributed by sideload with IfNotPresent.
    tag: mariadb-switchover-follow-alpha23-20260506-1005-amd64

## @param componentServiceVersion define default serviceVersion of each Component
defaultServiceVersion:
  mariadb: 10.6.15
  replication: 11.4.10
  galera: 11.4.10

etcd:
  etcdCmpdName: etcd

## MySQL Authentication parameters
auth:
  ## MYSQL_ROOT_HOST
  rootHost: "%"
  ## @param auth.createDatabase Whether to create the .Values.auth.database or not
  ##
  createDatabase: true
  ## @param auth.database Name for a custom database to create
  ## MYSQL_DATABASE
  database: "mydb"

dataMountPath: /var/lib/mysql
clusterDomain: cluster.local

roleProbe:
  # Cadence tightened from 5s to 3s per #397 (Route B follow-up).
  # 5s contributed ~20% of observation gap latency in #396 R1 attribution.
  # 3s reduces tail latency by ~40% with ~67% CPU/log overhead increase.
  # Tested under cell-3/cell-4 baseline conditions; deeper reduction (2s)
  # may be considered after cross-engine validation.
  periodSeconds: 3
  # alpha.13 P1: bumped 1 → 2 per #402 zombie redline mitigation.
  # SHOW SLAVE STATUS occasional >1s spike → kbagent SIGKILL probe script →
  # grep orphan reparent to PID 1 (kbagent Go non-reaper) → zombie accumulation.
  # 2s gives margin while staying < 3s cadence. Pattern B mitigation joint with P2.
  timeoutSeconds: 2

nameOverride: ""
fullnameOverride: ""
