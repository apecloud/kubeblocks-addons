apiVersion: parameters.kubeblocks.io/v1alpha1
kind: ParametersDefinition
metadata:
  name: {{ include "kafka.paramsDefName" . }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
spec:
  componentDef: {{ printf "(%s|%s|%s)" (include "kafka-broker.cmpdRegexpPattern" .) (include "kafka-combine.cmpdRegexpPattern" .) (include "kafka-controller.cmpdRegexpPattern" .) | quote }}
  templateName: kafka-configuration-tpl
  fileName: server.properties
  fileFormatConfig:
    format: properties
  parametersSchema:
    # top level mysql configuration type
    topLevelKey: KafkaParameter
    # schemaInJSON: auto generate from cue scripts
    cue: |-
      {{- .Files.Get "configs/kafka-server-constraint.cue" | nindent 6 }}
---
apiVersion: parameters.kubeblocks.io/v1alpha1
kind: ParametersDefinition
metadata:
  name: {{ include "kafka2.paramsDefName" . }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
spec:
  componentDef: {{ include "kafka2-broker.componentDefName" . }}
  templateName: kafka-configuration-tpl
  fileName: server.properties
  fileFormatConfig:
    format: properties
  parametersSchema:
    # top level mysql configuration type
    topLevelKey: KafkaParameter
    # schemaInJSON: auto generate from cue scripts
    cue: |-
      {{- .Files.Get "configs/2.7/kafka-server-constraint.cue" | nindent 6 }}
