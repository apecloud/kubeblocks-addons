apiVersion: apps.kubeblocks.io/v1
kind: ComponentVersion
metadata:
  name: hbase-hmaster
  labels:
    {{- include "hbase.labels" . | nindent 4 }}
  annotations:
    {{- include "hbase.apiVersion" . | nindent 4 }}
spec:
  compatibilityRules:
    - compDefs:
        - hbase-hmaster-2.5
      releases:
        - 2.5.6
  releases:
    - name: 2.5.6
      serviceVersion: 2.5.6
      images:
        init-hdfs-root-layout: {{ include "hbase.hmasterImage" . | quote }}
        hbase-hmaster: {{ include "hbase.hmasterImage" . | quote }}
        jmx-exporter: {{ include "hbase.jmxExporterImage" . | quote }}
