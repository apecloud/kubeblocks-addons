# Default values for elasticsearch.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""

fullnameOverride: ""

clusterDomain: "cluster.local"

## @param application images
##
image:
  # bitnami/elasticsearch
  # docker pull bitnami/elasticsearch
  registry: docker.io
  repository: elasticsearch
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "8.8.2"
  exporter:
    repository: prometheuscommunity/elasticsearch-exporter
    tag: "v1.7.0"
  # refer: addons/elasticsearch/plugins/Dockerfile
  plugin:
    repository: apecloud/elasticsearch-plugins
    tag: "0.1.1"
  tools:
    repository: apecloud/curl-jq
    tag: 0.1.0
  customPlugins:
    repository: apecloud/elasticsearch-custom-plugins
    tag: 0.1.2
  kibana:
    repository: apecloud/kibana
    tag: "8.8.2"
  agent:
    repository: apecloud/elasticsearch-agent
    tag: "0.1.1"
  # elasticsearch-dump: https://github.com/elasticsearch-dump/elasticsearch-dump
  esDump:
    repository: elasticdump/elasticsearch-dump
    tag: "v6.124.2"

## @param supported elasticsearch versions with detailed information
esVersions:
  - major: "6"
    componentDef: "^elasticsearch-6-"
    masterComponentDef: "^elasticsearch-master-6-"
    dataComponentDef: "^elasticsearch-data-6-"
    minors:
      # [version, serviceVersion, tag, deprecated]
      - ["6.8.23", "6.8.23", "6.8.23", false]
  - major: "7"
    componentDef: "^elasticsearch-7-"
    masterComponentDef: "^elasticsearch-master-7-"
    dataComponentDef: "^elasticsearch-data-7-"
    minors:
      # [version, serviceVersion, tag, deprecated]
      - ["7.7.1", "7.7.1", "7.7.1", false]
      - ["7.8.1", "7.8.1", "7.8.1", false]
      - ["7.10.1", "7.10.1", "7.10.1", false]
      - ["7.10.2", "7.10.2", "7.10.2", false]
  - major: "8"
    componentDef: "^elasticsearch-8-"
    masterComponentDef: "^elasticsearch-master-8-"
    dataComponentDef: "^elasticsearch-data-8-"
    minors:
      # [version, serviceVersion, tag, deprecated]
      - ["8.1.3", "8.1.3", "8.1.3", false]
      - ["8.8.2", "8.8.2", "8.8.2", false]
      - ["8.15.5", "8.15.5", "8.15.5", false]
      - ["8.19.0", "8.19.0", "8.19.0", false]

## @param supported kibana versions with detailed information
kibanaVersions:
  - major: "6"
    componentDef: "^kibana-6-"
    minors:
      # [version, serviceVersion, tag, deprecated]
      - ["6.8.23", "6.8.23", "6.8.23", false]
  - major: "7"
    componentDef: "^kibana-7-"
    minors:
      # [version, serviceVersion, tag, deprecated]
      - ["7.7.1", "7.7.1", "7.7.1", false]
      - ["7.8.1", "7.8.1", "7.8.1", false]
      - ["7.10.1", "7.10.1", "7.10.1", false]
      - [ "7.10.2", "7.10.2", "7.10.2", false]
  - major: "8"
    componentDef: "^kibana-8-"
    minors:
      # [version, serviceVersion, tag, deprecated]
      - ["8.1.3", "8.1.3", "8.1.3", false]
      - ["8.8.2", "8.8.2", "8.8.2", false]
      - ["8.9.1", "8.9.1", "8.9.1", false]
      - ["8.15.5", "8.15.5", "8.15.5", false]
      - ["8.19.0", "8.19.0", "8.19.0", false]

# @param zoneAware enable zone awareness
# @param zoneAware.enabled enable zone awareness
# @param zoneAware.configMap config map name for zone awareness mapping
# The config map will be mounted as a volume at /mnt/zone-aware-mapping/mapping
# The config map should have the following format:
# apiVersion: v1
# kind: ConfigMap
# metadata:
#   name: elasticsearch-zone-aware-mapping
# data:
#   mapping: |
#     zone1: node1,node2
#     zone2: node3,node4,node5
#     zone3:
zoneAware:
  enabled: false
  configMap: elasticsearch-zone-aware-mapping

exporter:
  service:
    port: 9114

# Elasticsearch 9.x stays disabled until every immutable release input is
# pinned. The release workflow enables it only after all digests are readable.
es9:
  enabled: false
  serviceVersion: "9.3.2"
  images:
    elasticsearch: "docker.io/library/elasticsearch@sha256:56282e41f1d9c8dc437e4c99d132cf9f154def73b6ea8a25ac969a28c2f529c6"
    kibana: "docker.io/apecloud/kibana@sha256:cbf27174cf03e9d59505510c540a3e1ac69718fc863728280f316a93248cead9"
    plugin: ""
    exporter: "docker.io/prometheuscommunity/elasticsearch-exporter@sha256:4786d49bef9ec045c155d5544abc420e6f58394170db7b6a05c5e7a5f15fb9ed"
    tools: "docker.io/apecloud/curl-jq@sha256:c13c8973db9bd23b7c3b77654ba18105f3882fb6f655f7b313145154e401a672"
    agent: "docker.io/apecloud/elasticsearch-agent@sha256:4aea14decbbd4ca0b1453e17031c5087668b2dcab607b1076ff8418c29e73c8d"
    esDump: "docker.io/elasticdump/elasticsearch-dump@sha256:1a1f861c445db5f1e08222107ac0aa12a0c895320daa45c0a6c11985a873675a"
