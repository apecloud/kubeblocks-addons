apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "elasticsearch.scriptsTplName" . }}
  labels:
    {{- include "elasticsearch.labels" . | nindent 4 }}
data:
  post-start-hook.sh: |-
    {{- .Files.Get "scripts/post-start-hook.sh" | nindent 4 }}
  pre-stop-hook.sh: |-
    {{- .Files.Get "scripts/pre-stop-hook.sh" | nindent 4 }}
  prepare-fs.sh: |-
    {{- .Files.Get "scripts/prepare-fs.sh" | nindent 4 }}
  readiness-probe-script.sh: |-
    {{- .Files.Get "scripts/readiness-probe-script.sh" | nindent 4 }}
  install-plugins.sh: |-
    {{- .Files.Get "scripts/install-plugins.sh" | nindent 4 }}
  member-leave.sh: |-
    {{- .Files.Get "scripts/member-leave.sh" | nindent 4 }}
  entrypoint.sh: |-
    {{- .Files.Get "scripts/entrypoint.sh" | nindent 4 }}
  kibana-entrypoint.sh: |-
    {{- .Files.Get "scripts/kibana-entrypoint.sh" | nindent 4 }}
  kibana-probe.sh: |-
    {{- .Files.Get "scripts/kibana-probe.sh" | nindent 4 }}
