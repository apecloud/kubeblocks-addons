{{- if .Values.es9.enabled }}
apiVersion: apps.kubeblocks.io/v1
kind: ComponentDefinition
metadata:
  name: {{ include "kibana9.cmpdName" . }}
  annotations:
    apps.kubeblocks.io/skip-immutable-check: "true"
    {{- include "elasticsearch.annotations" . | nindent 4 }}
  labels:
    {{- include "elasticsearch.labels" . | nindent 4 }}
spec:
  serviceVersion: 9.3.2
  configs:
  - name: kibana-cm
    template: {{ include "kibana9.configTplName" . }}
    namespace: {{ .Release.Namespace }}
    volumeName: kibana-cm
    restartOnFileChange: true
  {{ include "kibana9.common" . | nindent 2 }}
{{- end }}
