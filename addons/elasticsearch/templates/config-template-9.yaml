{{- if .Values.es9.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "elasticsearch9.configTplName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
  {{- include "elasticsearch.labels" . | nindent 4 }}
  annotations:
  {{ include "kblib.helm.resourcePolicy" . | nindent 4 }}
data:
  elasticsearch.yml: |-
    {{- .Files.Get "configs/elasticsearch-9.yml.tpl" | nindent 4 }}
  log4j2.properties: |-
    {{- .Files.Get "configs/elasticsearch-9-log4j2.properties" | nindent 4 }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kibana9.configTplName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
  {{- include "elasticsearch.labels" . | nindent 4 }}
data:
  kibana.yml: |-
    {{- .Files.Get "configs/kibana-9.yml.tpl" | nindent 4 }}
{{- end }}
