{{- $imageRegistry := .Values.image.registry | default "docker.io" -}}
apiVersion: apps.kubeblocks.io/v1
kind: ComponentVersion
metadata:
  name: elasticsearch
  labels:
    {{- include "elasticsearch.labels" . | nindent 4 }}
  annotations:
    {{- include "elasticsearch.annotations" . | nindent 4 }}
spec:
  compatibilityRules:
{{- range .Values.esVersions }}
  - compDefs:
    - {{ .componentDef }}
    - {{ .masterComponentDef }}
    - {{ .dataComponentDef }}
{{- if .ingestComponentDef }}
    - {{ .ingestComponentDef }}
{{- end }}
{{- if .transformComponentDef }}
    - {{ .transformComponentDef }}
{{- end }}
    releases:
{{- range .minors }}
      - {{ index . 0 }}
{{- end }}
{{- end }}
  releases:
{{- range .Values.esVersions }}
{{- $esRegistry := .imageRegistry | default $imageRegistry }}
{{- range .minors }}
{{- if not (index . 3) }}
  - name: {{ index . 0 }}
    serviceVersion: {{ index . 1 }}
    images:
      elasticsearch: {{ $esRegistry }}/{{ $.Values.image.repository }}:{{ index . 2 }}
      prepare-plugins: {{ $imageRegistry }}/{{ $.Values.image.plugin.repository }}:{{ $.Values.image.plugin.tag }}
      install-plugins: {{ $esRegistry }}/{{ $.Values.image.repository }}:{{ index . 2 }}
      es-agent: {{ $imageRegistry }}/{{ $.Values.image.agent.repository }}:{{ $.Values.image.agent.tag }}
      exporter: {{ $imageRegistry }}/{{ $.Values.image.exporter.repository }}:{{ $.Values.image.exporter.tag }}
      memberleave: {{ $imageRegistry }}/{{ $.Values.image.tools.repository }}:{{ $.Values.image.tools.tag }}
      install-es-agent: {{ $imageRegistry }}/{{ $.Values.image.agent.repository }}:{{ $.Values.image.agent.tag }}
{{- end }}
{{- end }}
{{- end }}
