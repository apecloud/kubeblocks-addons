apiVersion: apps.kubeblocks.io/v1
kind: ComponentDefinition
metadata:
  name: {{ include "elasticsearchData9.cmpdName" . }}
  labels:
    {{- include "elasticsearch.labels" . | nindent 4 }}
  annotations:
    {{- include "elasticsearch.annotations" . | nindent 4 }}
spec:
  serviceVersion: 9.3.2
  replicasLimit:
    minReplicas: 2
    maxReplicas: 16384
  configs:
    - name: es-cm
      template: {{ include "elasticsearch9.configTplName" . }}
      namespace: {{ .Release.Namespace }}
      volumeName: es-cm
      restartOnFileChange: true
  vars:
    - name: ELASTICSEARCH_VERSION
      valueFrom:
        componentVarRef:
          optional: false
          serviceVersion: Required
    - name: ELASTIC_USER_PASSWORD
      valueFrom:
        credentialVarRef:
          compDef: {{ include "elasticsearchMaster9.cmpdName" . }}
          name: elastic
          optional: false
          password: Required
    - name: ELASTIC_PASSWORD
      value: $(ELASTIC_USER_PASSWORD)
    - name: KIBANA_SYSTEM_USER_PASSWORD
      valueFrom:
        credentialVarRef:
          compDef: {{ include "elasticsearchMaster9.cmpdName" . }}
          name: kibana_system
          optional: false
          password: Required
    - name: ELASTICSEARCH_HOST
      valueFrom:
        serviceVarRef:
          compDef: {{ include "elasticsearchData9.cmpdName" . }}
          name: http
          host: Required
    - name: CLUSTER_DOMAIN
      value: {{ .Values.clusterDomain }}
    - name: ES_COMPONENT_NAME
      valueFrom:
        componentVarRef:
          optional: false
          componentName: Required
    - name: ES_COMPONENT_SHORT_NAME
      valueFrom:
        componentVarRef:
          optional: false
          shortName: Required
    - name: CLUSTER_NAMESPACE
      valueFrom:
        clusterVarRef:
          namespace: Required
    - name: CLUSTER_NAME
      valueFrom:
        clusterVarRef:
          clusterName: Required
    - name: ELASTICSEARCH_ROLES
      value: data,ingest
    - name: ALL_CMP_REPLICA_LIST
      valueFrom:
        componentVarRef:
          compDef: {{ include "elasticsearch.cmpdRegexPattern" . }}
          optional: false
          podNames: Required
          multipleClusterObjectOption:
            strategy: combined
            combinedOption:
              flattenFormat:
                delimiter: ";"
                keyValueDelimiter: ":"
    - name: ALL_CMP_REPLICA_FQDN
      valueFrom:
        componentVarRef:
          compDef: {{ include "elasticsearch.cmpdRegexPattern" . }}
          optional: false
          podFQDNs: Required
          multipleClusterObjectOption:
            strategy: combined
            combinedOption:
              flattenFormat:
                delimiter: ";"
                keyValueDelimiter: ":"
    - name: TLS_ENABLED
      valueFrom:
        tlsVarRef:
          enabled: Optional
    - name: ZONE_AWARE_ENABLED
      value: {{ .Values.zoneAware.enabled | quote }}
  {{ include "elasticsearch.common" . | nindent 2 }}
