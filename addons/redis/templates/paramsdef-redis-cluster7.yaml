{{- $pd := .Files.Get "config/redis-config-effect-scope.yaml" | fromYaml }}
apiVersion: parameters.kubeblocks.io/v1alpha1
kind: ParametersDefinition
metadata:
  name: {{ include "redisCluster7.paramsDefName" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
spec:
  reloadAction:
    shellTrigger:
      sync: true
      command:
        - "reload-parameter.sh"
      scriptConfig:
        scriptConfigMapRef: redis-reload-tools-script
        namespace: {{ .Release.Namespace }}
      toolsSetup:
        mountPoint: /kb_tools
        toolConfigs:
          - name: kb-tools
            asContainerImage: true
            image: {{ include "redis7.image" . }}

  fileName: redis.conf
  # ConfigurationSchema that impose restrictions on engine parameter's rule
  parametersSchema:
    topLevelKey: RedisParameter
    cue: |-
      {{- .Files.Get "config/redis-cluster7-config-constraint.cue" | nindent 6 }}

  ## require db instance restart
  {{- if hasKey $pd "staticParameters" }}
  staticParameters:
    {{- $params := get $pd "staticParameters" }}
    {{- range $params }}
    - {{ . }}
    {{- end }}
  {{- end}}
