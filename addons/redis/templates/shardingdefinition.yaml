apiVersion: apps.kubeblocks.io/v1
kind: ShardingDefinition
metadata:
  name: redis-cluster
  labels:
    {{- include "redis.labels" . | nindent 4 }}
  annotations:
    {{- include "redis.apiVersion" . | nindent 4 }}
spec:
  template:
    compDef: {{ include "redisCluster.cmpdRegexpPattern" . }}
  shardsLimit:
    minShards: 3
    maxShards: 64
  provisionStrategy: Parallel
  updateStrategy: Parallel
  systemAccounts:
    - name: default
      shared: true
  lifecycleActions:
    shardRemove:
      # kbagent caps lifecycle action calls at 60s; keep this below the cap
      # and let retryPolicy re-enter the idempotent shardRemove action.
      timeoutSeconds: 50
      exec:
        container: redis-cluster
        command:
          - /bin/bash
          - -c
          - |
            log=/tmp/pre-terminate.log
            : > "$log"
            if [ "$LEGACY_REDIS" == "true" ]; then
               script=/scripts/redis-cluster6-manage.sh
            else
               script=/scripts/redis-cluster-manage.sh
            fi
            "$script" --pre-terminate > "$log" 2>&1
            rc=$?
            cat "$log" >&2 || true
            exit "$rc"
      retryPolicy:
        maxRetries: 10
