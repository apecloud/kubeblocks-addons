apiVersion: apps.kubeblocks.io/v1
kind: ComponentDefinition
metadata:
  name: {{ include "redisTwemproxy05.cmpdName" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
  annotations:
    {{- include "redis.annotations" . | nindent 4 }}
spec:
  provider: KubeBlocks
  description: A Twemproxy component definition for Kubernetes
  serviceKind: redis-twemproxy
  serviceVersion: {{ .Values.defaultServiceVersion.redisTwemproxy.major }}
  podManagementPolicy: Parallel
  services:
    - name: twemproxy
      serviceName: twemproxy
      spec:
        type: ClusterIP
        ports:
          - name: redis-twemproxy
            port: 22121
            targetPort: redis-twemproxy
  scripts:
    - name: redis-scripts
      template: {{ include "redis.scriptsTemplate" . }}
      volumeName: scripts
      namespace: {{ .Release.Namespace }}
      defaultMode: 365
  volumes:
    - highWatermark: 0
      name: data
      needSnapshot: false
  vars:
    ## reference to the all redis components service, the format is "redis0:redis-redis0-redis,redis1:redis-redis1-redis"
    - name: REDIS_SERVICE_NAMES
      valueFrom:
        serviceVarRef:
          compDef: {{ include "redis.cmpdRegexpPattern" . }}
          name: redis
          optional: false
          host: Required
          multipleClusterObjectOption:
            strategy: combined
    ## reference to the all redis components service port, the format is "redis0:6379,redis1:6379"
    - name: REDIS_SERVICE_PORTS
      valueFrom:
        serviceVarRef:
          compDef: {{ include "redis.cmpdRegexpPattern" . }}
          name: redis
          optional: false
          port:
            name: redis
            option: Required
          multipleClusterObjectOption:
            strategy: combined
    - name: REDIS_SENTINEL_SERVICE_HOSTS
      valueFrom:
        serviceVarRef:
          compDef: {{ include "redis.cmpdRegexpPattern" . }}
          name: redis-syncer-sentinel
          optional: true
          host: Required
          multipleClusterObjectOption:
            strategy: combined
    - name: REDIS_SENTINEL_SERVICE_PORTS
      valueFrom:
        serviceVarRef:
          compDef: {{ include "redis.cmpdRegexpPattern" . }}
          name: redis-syncer-sentinel
          optional: true
          port:
            name: redis-sentinel
            option: Required
          multipleClusterObjectOption:
            strategy: combined
    ## the default username of all redis components, it will generate a set of variables with the component name suffix like "REDIS_DEFAULT_USER_REDIS0", "REDIS_DEFAULT_USER_REDIS1"
    - name: REDIS_DEFAULT_USER
      valueFrom:
        credentialVarRef:
          compDef: {{ include "redis.cmpdRegexpPattern" . }}
          name: default
          username: Required
          multipleClusterObjectOption:
            strategy: individual
    ## the default password of all redis components, it will generate a set of variables with the component name suffix like "REDIS_DEFAULT_PASSWORD_REDIS0", "REDIS_DEFAULT_PASSWORD_REDIS1"
    - name: REDIS_DEFAULT_PASSWORD
      valueFrom:
        credentialVarRef:
          compDef: {{ include "redis.cmpdRegexpPattern" . }}
          name: default
          password: Required
          multipleClusterObjectOption:
            strategy: individual
  runtime:
    initContainers:
      - name: init-redis-twemproxy
        imagePullPolicy: {{ default .Values.busyboxImage.pullPolicy "IfNotPresent" }}
        command:
          - /scripts/redis-twemproxy-setup-v2.sh
        volumeMounts:
          - mountPath: /data
            name: data
          - mountPath: /etc/conf
            name: redis-config
          - mountPath: /etc/proxy
            name: proxy-conf
          - mountPath: /scripts
            name: scripts
    containers:
    - name: redis-twemproxy
      imagePullPolicy: {{ default .Values.redisTwemproxyImage.pullPolicy "IfNotPresent" }}
      command:
        - sh
        - -ec
        - |
          NUTCRACKER_CONF="${NUTCRACKER_CONF:-/etc/proxy/nutcracker.conf}"
          NUTCRACKER_PID_FILE="${NUTCRACKER_PID_FILE:-/tmp/nutcracker.pid}"
          SENTINEL_POLL_INTERVAL_SECONDS="${TWEMPROXY_SENTINEL_POLL_INTERVAL_SECONDS:-1}"
          LAST_MASTER_ADDR=""
          NUTCRACKER_PID=""

          normalize_master_addr() {
            addr="$1"
            host="${addr%:*}"
            port="${addr##*:}"
            case "$host" in
              *.*)
                resolved="$(getent hosts "$host" 2>/dev/null | awk 'NR == 1 {print $1}' || true)"
                if [ -n "$resolved" ]; then
                  host="$resolved"
                fi
                ;;
            esac
            printf '%s:%s' "$host" "$port"
          }

          first_value() {
            value="${1:-}"
            value="${value%%,*}"
            case "$value" in
              *:*) value="${value#*:}" ;;
            esac
            printf '%s' "$value"
          }

          default_master_name() {
            redis_service="$(first_value "${REDIS_SERVICE_NAMES:-}")"
            if [ -n "$redis_service" ]; then
              printf '%s' "${redis_service%-redis}"
            fi
          }

          query_sentinel_master() {
            sentinel_host="$1"
            sentinel_port="$2"
            master_name="$3"
            master_len=${#master_name}
            {
              printf '*3\r\n'
              printf '$8\r\nSENTINEL\r\n'
              printf '$23\r\nget-master-addr-by-name\r\n'
              printf '$%s\r\n%s\r\n' "$master_len" "$master_name"
            } | nc -w 2 "$sentinel_host" "$sentinel_port" 2>/dev/null | awk '
              /^\$/ {
                if (getline value) {
                  gsub(/\r/, "", value)
                  fields++
                  if (fields == 1) {
                    host = value
                  } else if (fields == 2) {
                    print host ":" value
                    exit
                  }
                }
              }
            '
          }

          start_nutcracker() {
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) starting nutcracker"
            nutcracker -c "$NUTCRACKER_CONF" -v 4 -m 16384 -p "$NUTCRACKER_PID_FILE" &
            NUTCRACKER_PID="$!"
          }

          stop_nutcracker() {
            if [ -n "${NUTCRACKER_PID:-}" ] && kill -0 "$NUTCRACKER_PID" 2>/dev/null; then
              echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) stopping nutcracker pid=$NUTCRACKER_PID"
              kill "$NUTCRACKER_PID" 2>/dev/null || true
              wait "$NUTCRACKER_PID" 2>/dev/null || true
            fi
            NUTCRACKER_PID=""
          }

          restart_nutcracker() {
            stop_nutcracker
            start_nutcracker
          }

          shutdown() {
            stop_nutcracker
            exit 0
          }

          trap shutdown TERM INT

          sentinel_host="$(first_value "${REDIS_SENTINEL_SERVICE_HOSTS:-}")"
          sentinel_port="$(first_value "${REDIS_SENTINEL_SERVICE_PORTS:-}")"
          sentinel_master_name="${SENTINEL_MASTER_NAME:-$(default_master_name)}"

          if [ -z "$sentinel_host" ] || [ -z "$sentinel_port" ] || [ -z "$sentinel_master_name" ]; then
            echo "Fake Sentinel service is not configured; starting nutcracker without master watcher"
            exec nutcracker -c "$NUTCRACKER_CONF" -v 4 -m 16384
          fi

          if ! command -v nc >/dev/null 2>&1; then
            echo "nc is required for twemproxy master watcher but was not found"
            exit 1
          fi

          echo "twemproxy master watcher enabled: sentinel=${sentinel_host}:${sentinel_port}, master=${sentinel_master_name}, interval=${SENTINEL_POLL_INTERVAL_SECONDS}s"
          LAST_MASTER_ADDR="$(query_sentinel_master "$sentinel_host" "$sentinel_port" "$sentinel_master_name" || true)"
          if [ -n "$LAST_MASTER_ADDR" ]; then
            LAST_MASTER_ADDR="$(normalize_master_addr "$LAST_MASTER_ADDR")"
          fi
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) initial Fake Sentinel master=${LAST_MASTER_ADDR:-unknown}"

          start_nutcracker
          while true; do
            if [ -n "${NUTCRACKER_PID:-}" ] && ! kill -0 "$NUTCRACKER_PID" 2>/dev/null; then
              echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) nutcracker exited; restarting"
              start_nutcracker
            fi

            current_master_addr="$(query_sentinel_master "$sentinel_host" "$sentinel_port" "$sentinel_master_name" || true)"
            if [ -n "$current_master_addr" ]; then
              current_master_addr="$(normalize_master_addr "$current_master_addr")"
              if [ -n "$LAST_MASTER_ADDR" ] && [ "$current_master_addr" != "$LAST_MASTER_ADDR" ]; then
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) Fake Sentinel master changed: ${LAST_MASTER_ADDR} -> ${current_master_addr}; restarting nutcracker"
                LAST_MASTER_ADDR="$current_master_addr"
                restart_nutcracker
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) nutcracker restarted after master change"
              else
                LAST_MASTER_ADDR="$current_master_addr"
              fi
            fi

            sleep "$SENTINEL_POLL_INTERVAL_SECONDS"
          done
      env:
        - name: CURRENT_POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: CURRENT_POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: CURRENT_POD_HOST_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.hostIP
      ports:
      - containerPort: 22121
        name: redis-twemproxy
      volumeMounts:
      - mountPath: /data
        name: data
      - mountPath: /etc/conf
        name: redis-config
      - mountPath: /etc/proxy
        name: proxy-conf
      - mountPath: /scripts
        name: scripts
