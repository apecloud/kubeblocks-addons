{{/*
Valkey Sentinel ComponentDefinition.

Architecture note:
  Sentinel is a separate process (not a library) that monitors Valkey primary
  instances and orchestrates automatic failover.  It runs as a distinct
  Kubernetes component alongside the data component.

  - 3 replicas (quorum = 2) are the minimum for a production deployment.
  - Sentinel has NO roles — all instances are equal peers.
  - Sentinel stores its state in /data/sentinel/redis-sentinel.conf, which is
    rewritten by Valkey on failover.  Persisting it on a PVC means a restarted
    Sentinel immediately knows which node is the current master.
  - The data component's postProvision action registers the initial primary with
    all Sentinel pods (see scripts/valkey-register-to-sentinel.sh).
*/}}
{{- range .Values.valkeyVersions }}
---
apiVersion: apps.kubeblocks.io/v1
kind: ComponentDefinition
metadata:
  name: {{ printf "%s-%s" .sentinelComponentDef $.Chart.Version }}
  labels:
    {{- include "valkey.labels" $ | nindent 4 }}
  annotations:
    {{- include "valkey.annotations" $ | nindent 4 }}
spec:
  provider: community
  description: Valkey Sentinel v{{ .major }}.x — HA monitor and failover orchestrator
  serviceKind: redis-sentinel
  serviceVersion: {{ .serviceVersion }}
  # Parallel: all Sentinel pods start concurrently.  There is no ordering
  # dependency between Sentinel peers — they elect a leader among themselves.
  podManagementPolicy: Parallel
  podUpgradePolicy: ReCreate
  updateStrategy: BestEffortParallel
  minReadySeconds: 10

  # Sentinel state is persisted in the data volume so the conf survives restarts.
  volumes:
    - name: data
      needSnapshot: false   # Sentinel conf is small; snapshot is not needed

  services:
    # Shared ClusterIP service — clients connect to any Sentinel pod.
    - name: valkey-sentinel
      serviceName: valkey-sentinel
      spec:
        ports:
          - name: valkey-sentinel
            port: 26379
            targetPort: valkey-sentinel
    # Per-pod NodePort (opt-in) for external Sentinel clients.
    - name: sentinel-advertised
      serviceName: sentinel-advertised
      spec:
        type: NodePort
        ports:
          - name: sentinel-advertised
            port: 26379
            targetPort: valkey-sentinel
      podService: true
      disableAutoProvision: true

  tls:
    volumeName: tls
    mountPath: {{ $.Values.tlsMountPath }}
    caFile: ca.crt
    certFile: tls.crt
    keyFile: tls.key

  scripts:
    - name: valkey-scripts
      template: {{ include "valkey.scriptsTemplate" $ }}
      namespace: {{ $.Release.Namespace }}
      volumeName: scripts
      defaultMode: 0555

  systemAccounts:
    - name: default
      initAccount: true
      passwordGenerationPolicy:
        length: 16
        numDigits: 8
        numSymbols: 0
        letterCase: MixedCases

  hostNetwork:
    containerPorts:
      - container: valkey-sentinel
        ports:
          - valkey-sentinel

  vars:
    - name: CLUSTER_NAME
      valueFrom:
        clusterVarRef:
          clusterName: Required
    - name: CLUSTER_NAMESPACE
      valueFrom:
        clusterVarRef:
          namespace: Required
    # Sentinel's own credentials (used for inter-Sentinel auth)
    - name: SENTINEL_USER
      valueFrom:
        credentialVarRef:
          name: default
          username: Required
    - name: SENTINEL_PASSWORD
      valueFrom:
        credentialVarRef:
          name: default
          password: Required
    - name: SENTINEL_POD_NAME_LIST
      valueFrom:
        componentVarRef:
          podNames: Required
    - name: SENTINEL_POD_FQDN_LIST
      valueFrom:
        componentVarRef:
          podFQDNs: Required
    # NodePort announce address (for external clients, opt-in)
    - name: REDIS_SENTINEL_ADVERTISED_PORT
      valueFrom:
        serviceVarRef:
          name: sentinel-advertised
          optional: true
          port:
            name: sentinel-advertised
            option: Required
    - name: REDIS_SENTINEL_ADVERTISED_SVC_NAME
      valueFrom:
        serviceVarRef:
          name: sentinel-advertised
          optional: true
          host: Required
    # Host-network dynamic port
    - name: REDIS_SENTINEL_HOST_NETWORK_PORT
      valueFrom:
        hostNetworkVarRef:
          optional: true
          container:
            name: valkey-sentinel
            port:
              name: valkey-sentinel
              option: Required
    - name: SENTINEL_SERVICE_PORT
      value: "26379"
      expression: {{ `{{if index . "REDIS_SENTINEL_HOST_NETWORK_PORT"}}{{.REDIS_SENTINEL_HOST_NETWORK_PORT}}{{else}}{{.SENTINEL_SERVICE_PORT}}{{end}}` | toYaml }}
    # Cross-component vars — used by ensure_monitor_stanza() in valkey-sentinel-start.sh
    # to auto-discover the master when all sentinels restart simultaneously (upgrade/chaos).
    - name: VALKEY_COMPONENT_NAME
      valueFrom:
        componentVarRef:
          compDef: {{ printf "^valkey-%s" .major }}
          optional: true
          componentName: Required
    - name: VALKEY_POD_FQDN_LIST
      valueFrom:
        componentVarRef:
          compDef: {{ printf "^valkey-%s" .major }}
          optional: true
          podFQDNs: Required
    - name: VALKEY_DEFAULT_PASSWORD
      valueFrom:
        credentialVarRef:
          compDef: {{ printf "^valkey-%s" .major }}
          name: default
          optional: true
          password: Required
    - name: SERVICE_PORT
      value: "6379"
    - name: TLS_ENABLED
      valueFrom:
        tlsVarRef:
          enabled: Optional
          optional: true
    - name: TLS_MOUNT_PATH
      value: {{ $.Values.tlsMountPath }}
    - name: VALKEY_CLI_TLS_ARGS
      value: ""
      expression: {{ `{{if eq (index . "TLS_ENABLED") "true"}}--tls --insecure{{else}}{{end}}` | toYaml }}

  lifecycleActions:
    accountProvision:
      exec:
        container: valkey-sentinel
        command: [sh, -c, /scripts/valkey-sentinel-account-provision.sh]

  runtime:
    containers:
      - name: valkey-sentinel
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        ports:
          - name: valkey-sentinel
            containerPort: 26379
        volumeMounts:
          - name: data
            mountPath: /data
          - name: scripts
            mountPath: /scripts
        env:
          - name: CURRENT_POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: CURRENT_POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: CURRENT_POD_HOST_IP
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
        command:
          - /bin/bash
          - -c
          - /scripts/valkey-sentinel-start.sh
        livenessProbe:
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 5
          exec:
            command: [sh, -c, /scripts/valkey-sentinel-ping.sh]
        readinessProbe:
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 5
          exec:
            command: [sh, -c, /scripts/valkey-sentinel-ping.sh]
{{- end }}
