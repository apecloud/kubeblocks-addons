{{/*
Scripts ConfigMap — bundles every file under scripts/ into a single ConfigMap.
The kblib helper functions (retry, pod FQDN utils) are inlined first so every
script can source common.sh and get them for free.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "valkey.scriptsTemplate" . }}
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
  annotations:
    {{- include "valkey.annotations" . | nindent 4 }}
data:
  # common.sh is sourced by all other scripts.  It provides:
  #   call_func_with_retry, get_target_pod_fqdn_from_pod_fqdn_vars,
  #   min_lexicographical_order_pod, set/unset_xtrace_when_ut_mode_false,
  #   sleep_when_ut_mode_false, contains, is_empty, extract_obj_ordinal
  common.sh: |-
    #!/bin/bash
    {{- include "kblib.commons.call_func_with_retry" $ | nindent 4 }}
    {{- include "kblib.compvars.get_target_pod_fqdn_from_pod_fqdn_vars" $ | nindent 4 }}
    {{- include "kblib.pods.min_lexicographical_order_pod" $ | nindent 4 }}
    {{- include "kblib.ututils.set_xtrace_when_ut_mode_false" $ | nindent 4 }}
    {{- include "kblib.ututils.unset_xtrace_when_ut_mode_false" $ | nindent 4 }}
    {{- include "kblib.ututils.sleep_when_ut_mode_false" $ | nindent 4 }}

    # ── Utility helpers ─────────────────────────────────────────────────
    is_empty() { [ -z "$1" ]; }
    contains() { [[ "$1" == *"$2"* ]]; }
    extract_obj_ordinal() { echo "$1" | grep -oE '[0-9]+$'; }
  {{- with include "valkey.extendScripts" . }}
  {{- . | nindent 2 }}
  {{- end }}
