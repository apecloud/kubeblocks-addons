{{/*
ActionSet for Valkey physical (RDB+AOF) backup and restore.

Backup flow:
  1. backupData: run BGSAVE on the target pod (secondary preferred), wait for
     completion, tar the entire /data directory and push with zstd compression.

Restore flow:
  1. prepareData: pull the archive and extract it into DATA_DIR before the pod starts.
  2. postReady: best-effort Sentinel monitor re-registration after data restore.

KubeBlocks DataProtection passes standard DP_* variables into all job containers;
DATA_DIR is injected from the ActionSet env. Current BackupPolicyTemplate env
schema only supports versionMapping for this chart path, so cross-component
Sentinel FQDN/password injection is not available here.
*/}}
apiVersion: dataprotection.kubeblocks.io/v1alpha1
kind: ActionSet
metadata:
  name: valkey-physical-br
  labels:
    clusterdefinition.kubeblocks.io/name: valkey
    {{- include "valkey.labels" . | nindent 4 }}
spec:
  backupType: Full
  env:
    - name: DATA_DIR
      value: {{ .Values.dataMountPath }}
    - name: TLS_MOUNT_PATH
      value: {{ .Values.tlsMountPath }}
  backup:
    preBackup: []
    postBackup: []
    backupData:
      image: {{ include "valkey.defaultImage" . }}
      runOnTargetPodNode: true
      syncProgress:
        enabled: true
        intervalSeconds: 5
      command:
        - bash
        - -c
        - |
          {{- .Files.Get "dataprotection/backup.sh" | nindent 10 }}
  restore:
    prepareData:
      image: {{ include "valkey.defaultImage" . }}
      command:
        - bash
        - -c
        - |
          {{- .Files.Get "dataprotection/restore.sh" | nindent 10 }}
    postReady:
      # Re-register the primary with Sentinel (Sentinel's own PVC is not backed up).
      # This is best-effort because current DP BackupPolicyTemplate env cannot
      # inject cross-component Sentinel credentials.
      - job:
          image: {{ include "valkey.defaultImage" . }}
          onError: Continue
          runOnTargetPodNode: false
          command:
            - bash
            - -c
            - |
              {{- .Files.Get "dataprotection/post-restore-sentinel.sh" | nindent 14 }}
