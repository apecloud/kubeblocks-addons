{{/*
BackupPolicyTemplate for Valkey.

Declares two backup methods:
  datafile        — physical backup (BGSAVE → tar+zstd via datasafed)
  volume-snapshot — CSI volume snapshot (zero-overhead, StorageClass-dependent)

Backup always targets the secondary replica to avoid impacting the primary.
If no secondary is available, it falls back to the primary.

Per-version image override: since ActionSet carries a default image, the
versionMapping env block here overrides it with the exact image for each
serviceVersion, ensuring the backup job runs the same binary as the data pod.
*/}}
apiVersion: dataprotection.kubeblocks.io/v1alpha1
kind: BackupPolicyTemplate
metadata:
  name: valkey-backup-policy-template
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
spec:
  # serviceKind must match cmpd.spec.serviceKind
  serviceKind: redis
  # Matches all valkey-* ComponentDefinitions (all major versions)
  compDefs:
    - {{ include "valkey.cmpdRegexpPattern" . }}

  # Prefer secondary to avoid BGSAVE latency spikes on the primary
  target:
    role: secondary
    fallbackRole: primary
    account: default

  backupMethods:
    # ── Physical backup (universal) ──────────────────────────────────────────
    - name: datafile
      snapshotVolumes: false
      actionSetName: valkey-physical-br
      targetVolumes:
        volumeMounts:
          - name: data
            mountPath: {{ .Values.dataMountPath }}
      env:
        # Override the ActionSet default image with the version-specific image
        - name: IMAGE
          valueFrom:
            versionMapping:
              {{- $repo := printf "%s/%s" (.Values.image.registry | default "docker.io") .Values.image.repository }}
              {{- range .Values.valkeyVersions }}
              {{- range .mirrorVersions }}
              - serviceVersions:
                  - {{ .version }}
                mappedValue: {{ $repo }}:{{ .imageTag }}
              {{- end }}
              {{- end }}

    # ── Volume snapshot (CSI-based, StorageClass must support it) ────────────
    - name: volume-snapshot
      snapshotVolumes: true
      targetVolumes:
        volumes:
          - data

  schedules:
    - backupMethod: datafile
      enabled: false
      cronExpression: "0 2 * * *"
      retentionPeriod: 7d
    - backupMethod: volume-snapshot
      enabled: false
      cronExpression: "0 2 * * *"
      retentionPeriod: 7d
---
# ── Cluster (sharding) topology ─────────────────────────────────────────────
# Per-shard datafile backup: each shard component independently targets its
# secondary (fallback primary) and archives the #2984 snapshot set
# (dump.rdb + users.acl + cluster-meta). nodes.conf is deliberately NOT
# archived — it is cluster identity and must be regenerated on restore.
#
# v1 restore compatibility matrix:
#   same shard count cluster -> cluster  -> supported. prepareData validates
#                                           each source target's cluster-meta;
#                                           postProvision rebuilds membership
#                                           and assigns that archive's exact
#                                           shard_slot_ranges before replicas
#                                           attach. Overlap/gap fails closed.
#   different shard count               -> unsupported (source_shards guard)
#   cluster <-> replication/standalone   -> unsupported
apiVersion: dataprotection.kubeblocks.io/v1alpha1
kind: BackupPolicyTemplate
metadata:
  name: valkey-cluster-backup-policy-template
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
  annotations:
    {{- include "valkey.annotations" . | nindent 4 }}
spec:
  serviceKind: valkey-cluster
  compDefs:
    - {{ include "valkeyCluster.cmpdRegexpPattern" . }}
  target:
    role: secondary
    fallbackRole: primary
    account: default
  backupMethods:
    - name: datafile
      snapshotVolumes: false
      actionSetName: valkey-physical-br
      targetVolumes:
        volumes:
          - data
        volumeMounts:
          - name: data
            mountPath: {{ .Values.dataMountPath }}
      env:
        - name: IMAGE
          valueFrom:
            versionMapping:
              {{- $repo := printf "%s/%s" (.Values.image.registry | default "docker.io") .Values.image.repository }}
              {{- range .Values.valkeyVersions }}
              {{- if eq .major "9" }}
              {{- range .mirrorVersions }}
              - serviceVersions:
                  - {{ .version }}
                mappedValue: {{ $repo }}:{{ .imageTag }}
              {{- end }}
              {{- end }}
              {{- end }}
  schedules:
    - backupMethod: datafile
      enabled: false
      cronExpression: "0 18 * * *"
      retentionPeriod: 7d
