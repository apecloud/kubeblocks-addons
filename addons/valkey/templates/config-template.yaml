apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "valkey.configTemplate" . }}
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
  annotations:
    {{- include "valkey.annotations" . | nindent 4 }}
data:
  valkey.conf: |-
    {{- .Files.Get "config/valkey-config.tpl" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "valkey.clusterConfigTemplate" . }}
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
  annotations:
    {{- include "valkey.annotations" . | nindent 4 }}
data:
  valkey.conf: |-
    {{- .Files.Get "config/valkey-cluster-config.tpl" | nindent 4 }}
