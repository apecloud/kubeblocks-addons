  labels:
    {{- include "doltdb.labels" . | nindent 4 }}
  annotations:
    {{- include "doltdb.annotations" . | nindent 4 }}
data:
  server.yaml: |-
    {{- .Files.Get "config/server.yaml.tpl" | nindent 4 }}
