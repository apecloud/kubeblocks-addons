apiVersion: parameters.kubeblocks.io/v1alpha1
kind: ParametersDefinition
metadata:
  name: {{ include "pulsar4.bookiesConfigConstraintName" . }}
  labels:
    {{- include "pulsar.labels" . | nindent 4 }}
spec:
  componentDef: {{ include "pulsar4.bookkeeperCmpdName" . }}
  templateName: bookies-config
  fileName: bookkeeper.conf
  fileFormatConfig:
    format: props-plus
  parametersSchema:
    cue: |-
      {{- .Files.Get "config/3.0.2/bookkeeper-config-constraint.cue" | nindent 6 }}
