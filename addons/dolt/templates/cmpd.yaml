apiVersion: apps.kubeblocks.io/v1
kind: ComponentDefinition
metadata:
  name: {{ include "dolt.cmpdName" . }}
  labels:
    {{- include "dolt.labels" . | nindent 4 }}
  annotations:
    {{- include "dolt.annotations" . | nindent 4 }}
spec:
  provider: community
  description: {{ .Chart.Description }}
  serviceKind: {{ .Chart.Name }}
  serviceVersion: {{ .Chart.AppVersion }}
  updateStrategy: Parallel
  podManagementPolicy: Parallel
  runtime:
    containers:
      - name: dolt
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /bin/sh
          - -c
          - /scripts/start.sh
        ports:
          - containerPort: 3306
            name: mysql
          - containerPort: {{ .Values.remotesApiPort }}
            name: remotesapi
        env:
          - name: CURRENT_POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name
          - name: REMOTES_API_PORT
            value: {{ .Values.remotesApiPort | quote }}
          - name: DOLT_ROOT_HOST
            value: {{ .Values.auth.rootHost | quote }}
        livenessProbe:
          exec:
            command: ["dolt", "--host", "127.0.0.1", "--port", "3306", "--no-tls", "sql", "-q", "select current_timestamp();"]
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["dolt", "--host", "127.0.0.1", "--port", "3306", "--no-tls", "sql", "-q", "select current_timestamp();"]
          initialDelaySeconds: 40
          periodSeconds: 10
        volumeMounts:
          - name: data
            mountPath: {{ .Values.dataDir }}
          - name: scripts
            mountPath: /scripts
          - name: config
            mountPath: /config
  volumes:
    - name: data
      needSnapshot: true
  services:
    - name: mysql
      serviceName: dolt
      spec:
        ports:
          - name: mysql
            port: 3306
            targetPort: mysql
          - name: remotesapi
            port: {{ .Values.remotesApiPort }}
            targetPort: remotesapi
      disableAutoProvision: false
  configs:
    - name: config
      template: {{ include "dolt.configTemplate" . }}
      namespace: {{ .Release.Namespace }}
      volumeName: config
      defaultMode: 0644
      restartOnFileChange: true
  scripts:
    - name: scripts
      template: {{ include "dolt.scriptTemplate" . }}
      namespace: {{ .Release.Namespace }}
      volumeName: scripts
      defaultMode: 0555
  roles:
    - name: primary
      updatePriority: 2
      participatesInQuorum: false
      isExclusive: true
    - name: standby
      updatePriority: 1
      participatesInQuorum: false
  lifecycleActions:
    roleProbe:
      exec:
        container: dolt
        command:
          - /bin/sh
          - -c
          - |
            role=$(dolt --host 127.0.0.1 --no-tls sql -q "select @@GLOBAL.dolt_cluster_role;" 2>/dev/null \
              | awk '/^\|/{gsub(/^[ \t]*\|[ \t]*/,""); gsub(/[ \t]*\|[ \t]*$/,""); if($1 != "@@GLOBAL.dolt_cluster_role" && $1 != "") {print $1; exit}}')
            echo -n "$role"
