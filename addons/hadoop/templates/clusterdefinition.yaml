apiVersion: apps.kubeblocks.io/v1
kind: ClusterDefinition
metadata:
  name: hadoop
  labels:
    {{- include "hadoop.labels" . | nindent 4 }}
  annotations:
    {{- include "hadoop.apiVersion" . | nindent 4 }}
spec:
  topologies:
    - name: ha-cluster
      default: true
      components:
        - name: hadoop-core
          compDef: {{ include "hadoop.hadoopCoreCmpdRegexPattern" . }}
        - name: journalnode
          compDef: {{ include "hadoop.hdfsJournalnodeCmpdRegexPattern" . }}
        - name: namenode
          compDef: {{ include "hadoop.hdfsNamenodeCmpdRegexPattern" . }}
        - name: datanode
          compDef: {{ include "hadoop.hdfsDatanodeCmpdRegexPattern" . }}
      orders:
        provision:
          - hadoop-core
          - journalnode
          - namenode
          - datanode
        terminate:
          - datanode
          - namenode
          - journalnode
          - hadoop-core