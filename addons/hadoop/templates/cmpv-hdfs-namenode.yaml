apiVersion: apps.kubeblocks.io/v1
kind: ComponentVersion
metadata:
  name: hdfs-namenode
  labels:
    {{- include "hadoop.labels" . | nindent 4 }}
  annotations:
    {{- include "hadoop.apiVersion" . | nindent 4 }}
spec:
  compatibilityRules:
    - releases:
        - v3.3.4
      compDefs:
        - hdfs-namenode
        - hdfs-namenode-standalone
  releases:
    - name: v3.3.4
      serviceVersion: v3.3.4
      images:
        hadoop-common: {{ include "hadoop.commonImage" . | quote }}
        init-namenode-format: {{ include "hadoop.initNameNodeFormatImage" . | quote }}
        init-zkfc-format: {{ include "hadoop.initZkfcFormatImage" . | quote }}
        hdfs-namenode: {{ include "hadoop.nameNodeImage" . | quote }}
        hdfs-zkfc: {{ include "hadoop.nameNodeImage" . | quote }}
