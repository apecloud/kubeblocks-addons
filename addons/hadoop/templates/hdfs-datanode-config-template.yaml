apiVersion: v1
kind: ConfigMap
metadata:
  name: datanode-config-template
  labels:
    {{- include "hadoop.labels" . | nindent 4 }}
data:
  hdfs-site.xml: |-
    {{- .Files.Get "config/hdfs-datanode.tpl" | nindent 4 }}
  log4j.properties: |-
    {{- .Files.Get "config/log4j.properties" | nindent 4 }}