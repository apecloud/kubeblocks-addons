apiVersion: parameters.kubeblocks.io/v1alpha1
kind: ParamConfigRenderer
metadata:
  name: hdfs-namenode-standalone-config-renderer
  labels:
    {{- include "hadoop.labels" . | nindent 4 }}
  annotations:
    {{- include "hadoop.annotations" . | nindent 4 }}
spec:
  componentDef: hdfs-namenode-standalone
  parametersDefs:
    - namenode-config-constraints
  configs:
    - name: hdfs-site.xml
      fileFormatConfig:
        format: xml
