apiVersion: apps.kubeblocks.io/v1
kind: ComponentDefinition
metadata:
  name: {{ include "tidb.pd7.compDefName" . }}
  annotations:
    {{- include "tidb.annotations" . | nindent 4}}
  labels:
    {{- include "tidb.labels" . | nindent 4 }}
spec:
  provider: kubeblocks
  description: tidb's metadata server
  updateStrategy: BestEffortParallel
  minReadySeconds: 30
  vars:
    - name: CLUSTER_NAMESPACE
      valueFrom:
        clusterVarRef:
          namespace: Required
    - name: PD_HOST
      valueFrom:
        serviceVarRef:
          compDef: {{ include "tidb.pd7.compDefName" . }}
          host: Required
    - name: PD_PORT
      valueFrom:
        serviceVarRef:
          compDef: {{ include "tidb.pd7.compDefName" . }}
          port:
            name: client
    - name: PD_ADDRESS
      value: "$(PD_HOST).$(CLUSTER_NAMESPACE).svc{{ .Values.clusterDomain }}:$(PD_PORT)"
    - name: PD_LEADER_POD_NAME
      valueFrom:
        componentVarRef:
          optional: true
          podNamesForRole:
            role: leader
            option: Optional
    - name: PD_POD_FQDN_LIST
      valueFrom:
        componentVarRef:
          optional: false
          podFQDNs: Required
  runtime:
    containers:
      - name: pd
        imagePullPolicy: IfNotPresent
        env:
          - name: CURRENT_POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name
          - name: SERVICE_PORT
            value: "2379"
        ports:
          - containerPort: 2379
            name: client
          - containerPort: 2380
            name: peer
        volumeMounts:
          - name: data
            mountPath: /var/lib/pd
          - name: config
            mountPath: /etc/pd
          {{- include "tidb.commonVolumeMount" . | nindent 10 }}
        command: [ "/scripts/pd_start.sh" ]
  volumes:
    - name: data
      needSnapshot: true
  scripts:
    - name: tidb-scripts
      template: {{ include "tidb.cmScriptsName" . }}
      namespace: {{ .Release.Namespace }}
      volumeName: scripts
      defaultMode: 0555
  configs:
    - name: pd-configuration
      template: {{ include "tidb.pd.configTplName" . }}
      namespace: {{ .Release.Namespace }}
      volumeName: config
      externalManaged: true
      reconfigure:
        exec:
          container: pd
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              /pd-ctl config set "$1" "$2"
            - --
        targetPodSelector: Role
        matchingKey: leader
  roles:
    - name: leader
      updatePriority: 2
      participatesInQuorum: true
      isExclusive: true
    - name: follower
      updatePriority: 1
      participatesInQuorum: true
  lifecycleActions:
    roleProbe:
      periodSeconds: 10
      exec:
        container: pd
        command: ["/scripts/pd_roleprobe.sh"]
    memberLeave:
      exec:
        container: pd
        command: ["/scripts/pd_memberleave.sh"]
    switchover:
      exec:
        container: pd
        command: ["/scripts/pd_switchover.sh"]
  exporter:
    containerName: pd
    scrapePort: "2379"
  services:
    - name: pd
      spec:
        ports:
          - name: client
            port: 2379
            targetPort: client
          - name: peer
            port: 2380
            targetPort: peer
