apiVersion: parameters.kubeblocks.io/v1alpha1
kind: ParametersDefinition
metadata:
  name: {{ include "tidb.tidb.paramName" . }}
  labels:
    {{- include "tidb.labels" . | nindent 4 }}
spec:
  componentDef: {{ include "tidb.tidb7.compDefName" . }}
  templateName: {{ include "tidb.tidb.configTplName" . }}
  fileName: tidb.toml
  fileFormatConfig:
    format: toml

  parametersSchema:
    topLevelKey: TIDBParameter
    cue: |-
      {{- .Files.Get "config/tidb-config-constraint.cue" | nindent 6 }}
