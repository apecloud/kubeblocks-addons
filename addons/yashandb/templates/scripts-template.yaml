apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "yashandb.scriptsTplName" . }}
  # 2026-06-23 Reason: KubeBlocks resolves ComponentDefinition script templates in the release namespace; Purpose: keep direct Helm-render apply aligned with controller lookup.
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashandb.labels" . | nindent 4 }}
data:
  {{- include "yashandb.extend.scripts" . | nindent 2 }}
