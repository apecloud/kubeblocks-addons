apiVersion: dataprotection.kubeblocks.io/v1alpha1
kind: ActionSet
metadata:
  name: mysql-xtrabackup-inc-br
  labels:
    {{- include "mysql.labels" . | nindent 4 }}
spec:
  backupType: Incremental
  env:
  - name: DATA_DIR
    value: "{{ .Values.dataMountPath }}/data"
  - name: MYSQL_DIR
    value: {{ .Values.dataMountPath }}
  - name: BACKUP_FOR_STANDBY
    value: "false"
  backup:
    preBackup: []
    postBackup: []
    backupData:
      image: $(XTRABACKUP_IMAGE)
      runOnTargetPodNode: true
      command:
      - bash
      - -c
      - |
        {{- .Files.Get "dataprotection/xtrabackup-incremental-backup.sh" | nindent 8 }}
      syncProgress:
        enabled: true
        intervalSeconds: 5
  restore:
    prepareData:
      image: $(XTRABACKUP_IMAGE)
      command:
      - bash
      - -c
      - |
        {{- .Files.Get "dataprotection/xtrabackup-incremental-restore.sh" | nindent 8 }}
    postReady:
    - exec:
        command:
        - sh
        - -c
        - |
          rm -rf {{ .Values.dataMountPath }}/data/.restore_new_cluster
