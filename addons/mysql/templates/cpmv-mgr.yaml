apiVersion: apps.kubeblocks.io/v1
kind: ComponentVersion
metadata:
  name: mysql-mgr
  labels:
    {{- include "mysql.labels" . | nindent 4 }}
  annotations:
    {{- include "mysql.apiVersion" . | nindent 4 }}
spec:
  compatibilityRules:
    - compDefs:
        - {{ include "mysql.componentDefNameMGR80" . }}
      releases:
        - 8.0.45
        - 8.0.46
    - compDefs:
        - {{ include "mysql.componentDefNameMGR84" . }}
      releases:
        - 8.4.9
        - 8.4.10
  releases:
    - name: 8.0.45
      serviceVersion: 8.0.45
      images:
        mysql: {{ .Values.image.registry | default "docker.io" }}/{{ .Values.image.repository }}:8.0.45
        accountProvision: {{ .Values.image.registry | default "docker.io" }}/{{ .Values.image.repository }}:8.0.45
        init-data: {{ .Values.image.registry | default "docker.io" }}/apecloud/mysql_audit_log:8.0.33
        {{- include "mysql.spec.runtime.images" . | nindent 8 }}
    - name: 8.0.46
      serviceVersion: 8.0.46
      images:
        mysql: {{ .Values.image.registry | default "docker.io" }}/{{ .Values.image.repository }}:8.0.46
        accountProvision: {{ .Values.image.registry | default "docker.io" }}/{{ .Values.image.repository }}:8.0.46
        init-data: {{ .Values.image.registry | default "docker.io" }}/apecloud/mysql_audit_log:8.0.33
        {{- include "mysql.spec.runtime.images" . | nindent 8 }}
    - name: 8.4.9
      serviceVersion: 8.4.9
      images:
        mysql: {{ .Values.image.registry | default "docker.io" }}/{{ .Values.image.repository }}:8.4.9
        accountProvision: {{ .Values.image.registry | default "docker.io" }}/{{ .Values.image.repository }}:8.4.9
        {{- include "mysql.spec.runtime.images" . | nindent 8 }}
    - name: 8.4.10
      serviceVersion: 8.4.10
      images:
        mysql: {{ .Values.image.registry | default "docker.io" }}/{{ .Values.image.repository }}:8.4.10
        accountProvision: {{ .Values.image.registry | default "docker.io" }}/{{ .Values.image.repository }}:8.4.10
        {{- include "mysql.spec.runtime.images" . | nindent 8 }}
