apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "milvus-standalone.configTemplateName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
  {{- include "milvus.labels" . | nindent 4 }}
  annotations:
  {{- include "milvus.annotations" . | nindent 4 }}
data:
  user.yaml: |-
    {{- .Files.Get "configs/standalone-user.yaml" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "milvus-cluster.configTemplateName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
  {{- include "milvus.labels" . | nindent 4 }}
  annotations:
  {{- include "milvus.annotations" . | nindent 4 }}
data:
  user.yaml: |-
    {{- .Files.Get "configs/cluster-user.yaml" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "milvus-scripts.configTemplateName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
  {{- include "milvus.labels" . | nindent 4 }}
  annotations:
  {{- include "milvus.annotations" . | nindent 4 }}
data:
  {{- range $path, $_ :=  $.Files.Glob "scripts/**" }}
  {{ $path | base }}: |-
  {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
