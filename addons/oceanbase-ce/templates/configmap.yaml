apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oceanbase-ce.cm.config" . }}
  labels:
    {{- include "oceanbase-ce.labels" . | nindent 4 }}
data:
  oceanbase.conf: |-
    {{- .Files.Get "config/oceanbase-config.tpl" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oceanbase-ce.cm.sysvars" . }}
  labels:
    {{- include "oceanbase-ce.labels" . | nindent 4 }}
data:
  oceanbase.sysvars: |-
    {{- .Files.Get "config/oceanbase-sysvars.tpl" | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oceanbase-ce.scripts.bootscripts" . }}
  labels:
    {{- include "oceanbase-ce.labels" . | nindent 4 }}
data:
  {{- include "oceanbase-ce.extend.scripts" . | nindent 2 }}
  update-parameters.sh: |-
    {{- .Files.Get "reloader/update-parameters.sh" | nindent 4 }}
  update-sysvars.sh: |-
    {{- .Files.Get "reloader/update-sysvars.sh" | nindent 4 }}
