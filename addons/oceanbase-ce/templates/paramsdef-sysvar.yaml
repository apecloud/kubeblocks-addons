{{- $pd := .Files.Get "config/oceanbase-sysvars-effect-scope.yaml" | fromYaml }}
apiVersion: parameters.kubeblocks.io/v1alpha1
kind: ParametersDefinition
metadata:
  name: {{ include "oceanbase-ce.pdVarName" . }}
  labels:
    {{- include "oceanbase-ce.labels" . | nindent 4}}
spec:
  componentDef: {{ include "oceanbase-ce.compDefName" . }}
  templateName: {{ include "oceanbase-ce.cm.sysvars" . }}
  fileName: oceanbase.sysvars
  fileFormatConfig:
    format: properties

  # ConfigurationSchema that impose restrictions on engine parameter's rule
  parametersSchema:
    # top level mysql configuration type
    topLevelKey: OBSysVariables

    # schemaInJSON: auto generate from cue scripts
    # example: ../../pkg/configuration/testdata/mysql_openapi.json
    cue: |-
      {{- .Files.Get "config/oceanbase-sysvars-constraint.cue" | nindent 6 }}

  ##  require db instance restart
  ## staticParameters
  {{- if hasKey $pd "staticParameters" }}
  staticParameters:
    {{- $params := get $pd "staticParameters" }}
    {{- range $params }}
    - {{ . }}
    {{- end }}
  {{- end}}

  {{- if hasKey $pd "dynamicParameters" }}
  dynamicParameters:
    {{- $params := get $pd "dynamicParameters" }}
    {{- range $params }}
    - {{ . }}
    {{- end }}
  {{- end}}

      ## define immutable parameter list, this feature is not currently supported.
  {{- if hasKey $pd "immutableParameters" }}
  immutableParameters:
    {{- $params := get $pd "immutableParameters" }}
    {{- range $params }}
    - {{ . }}
    {{- end }}
  {{- end}}
