apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: doltdb-cluster
  namespace: demo
spec:
  terminationPolicy: Delete
  clusterDef: doltdb
  topology: standalone
  componentSpecs:
    - name: doltdb
      serviceVersion: "2.1.10"
      replicas: 1
      env:
        - name: DOLT_DATABASE
          value: testdb
      configs:
        - name: doltdb-server-config
          restart: true
          variables:
            DOLT_LOG_LEVEL: debug
            DOLT_LOG_FORMAT: text
            DOLT_READ_ONLY: "false"
            DOLT_AUTOCOMMIT: "true"
            DOLT_TRANSACTION_COMMIT: "false"
            DOLT_AUTO_GC_ENABLED: "true"
            DOLT_MAX_CONNECTIONS: "123"
            DOLT_BACK_LOG: "77"
            # Dolt applies these as second-based SQL timeouts. Use whole-second values.
            DOLT_READ_TIMEOUT_MILLIS: "12000"
            DOLT_WRITE_TIMEOUT_MILLIS: "23000"
      resources:
        limits:
          cpu: "1"
          memory: 1Gi
        requests:
          cpu: "1"
          memory: 1Gi
      volumeClaimTemplates:
        - name: data
          spec:
            storageClassName: ""
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
