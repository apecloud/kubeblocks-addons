apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: dolt-repl
  namespace: demo
spec:
  # Valid options are: [DoNotTerminate, Delete, WipeOut]
  terminationPolicy: Delete
  componentSpecs:
    - name: dolt
      # ComponentDefinition from the dolt addon (replication / primary-standby).
      # You can also use a regexp such as: ^dolt-replication$
      componentDef: dolt-replication
      # Must match a release in ComponentVersion `dolt` (e.g. replica-1.84.0).
      serviceVersion: "1.84.0"
      disableExporter: false
      replicas: 2
      resources:
        limits:
          cpu: "0.5"
          memory: 0.5Gi
        requests:
          cpu: "0.5"
          memory: 0.5Gi
      volumeClaimTemplates:
        - name: data
          spec:
            storageClassName: ""
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
