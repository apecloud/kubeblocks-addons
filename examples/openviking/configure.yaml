apiVersion: operations.kubeblocks.io/v1alpha1
kind: OpsRequest
metadata:
  name: openviking-reconfiguring
  namespace: demo
spec:
  # Specifies the name of the Cluster resource that this operation is targeting.
  clusterName: openviking-cluster
  # Bypass pre-checks. Leave false unless you know what you are doing.
  force: false
  # Reconfigure the OpenViking component. Each parameter key is the dotted
  # path inside ov.conf (see addons/openviking/config/ov-config-constraint.cue).
  reconfigures:
    - componentName: openviking
      parameters:
        - key: embedding.dense.api_key
          value: "YOUR_VOLCENGINE_EMBEDDING_KEY"
        - key: embedding.dense.model
          value: "doubao-embedding-vision-251215"
        - key: embedding.dense.dimension
          value: "1024"
        - key: vlm.api_key
          value: "YOUR_VOLCENGINE_VLM_KEY"
        - key: vlm.model
          value: "doubao-seed-2-0-pro-260215"
        - key: vlm.temperature
          value: "0.0"
  preConditionDeadlineSeconds: 0
  type: Reconfiguring
