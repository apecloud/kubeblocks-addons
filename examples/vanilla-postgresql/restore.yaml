apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: vanpg-restore
  namespace: demo
spec:
  restore:
    source:
      apiGroup: dataprotection.kubeblocks.io
      kind: Backup
      name: vanpg-cluster-pg-basebackup
      namespace: demo
    parameters:
      dataprotection.kubeblocks.io/source-target-name: postgresql
      dataprotection.kubeblocks.io/volume-restore-policy: Parallel
  terminationPolicy: Delete
  clusterDef: vanilla-postgresql
  topology: vanilla-postgresql
  componentSpecs:
    - name: postgresql
      serviceVersion: "14.7.0"
      disableExporter: true
      replicas: 2
      resources:
        limits:
          cpu: "0.5"
          memory: "0.5Gi"
        requests:
          cpu: "0.5"
          memory: "0.5Gi"
      volumeClaimTemplates:
        - name: data
          spec:
            storageClassName: ""
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
