apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: yashandb-cluster
  namespace: demo
spec:
  terminationPolicy: Delete
  componentSpecs:
    - name: yashan-comp
      # 2026-06-23 Reason: PR examples should create clusters from the current immutable addon revision; Purpose: avoid users starting from stale alpha ComponentDefinitions after validation fixes.
      # 2026-07-06 Reason: upstream main advanced the chart version to 1.2.0-alpha.1 during PR review; Purpose: keep example clusters aligned with the rendered ComponentDefinition name.
      # Time: 2026-07-06.
      componentDef: yashandb-1.2.0-alpha.1
      # Only supports Standalone YashanDB at the moment
      # Must set replcias to 1.
      replicas: 1
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
      resources:
        limits:
          cpu: "1"
          memory: "4Gi"
        requests:
          cpu: "1"
          memory: "4Gi"
