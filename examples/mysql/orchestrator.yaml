apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: myorc
  namespace: demo
spec:
  clusterDef: orchestrator
  topology: raft
  terminationPolicy: Delete
  services:
    - name: orchestrator
      componentSelector: orchestrator
      roleSelector: primary
      spec:
        ports:
          - name: orc-http
            port: 80
            targetPort: orc-http
  componentSpecs:
    - name: orchestrator
      disableExporter: true
      replicas: 3
      resources:
        limits:
          cpu: "1"
          memory: "1Gi"
        requests:
          cpu: "1"
          memory: "1Gi"
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
