apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: redis-syncer
  namespace: demo
spec:
  terminationPolicy: Delete
  clusterDef: redis
  topology: replication-syncer
  componentSpecs:
    - name: redis
      serviceVersion: "7.2.4"
      disableExporter: false
      replicas: 2
      resources:
        limits:
          cpu: "0.5"
          memory: 0.5Gi
        requests:
          cpu: "0.5"
          memory: 0.5Gi
      volumeClaimTemplates:
        - name: data
          spec:
            storageClassName: ""
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
