apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: valkey-standalone
  namespace: demo
spec:
  terminationPolicy: Delete
  clusterDef: valkey
  topology: standalone
  componentSpecs:
    - name: valkey
      serviceVersion: "9.0.0"
      disableExporter: false
      replicas: 1
      resources:
        limits:
          cpu: "0.5"
          memory: 0.5Gi
        requests:
          cpu: "0.5"
          memory: 0.5Gi
      volumeClaimTemplates:
        - name: data
          spec:
            storageClassName: ""
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
