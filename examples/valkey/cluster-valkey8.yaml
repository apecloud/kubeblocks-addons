apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: valkey-8-replication
  namespace: demo
spec:
  terminationPolicy: Delete
  clusterDef: valkey
  topology: replication-8
  componentSpecs:
    - name: valkey-sentinel
      serviceVersion: "8.1.3"
      replicas: 3
      resources:
        limits:
          cpu: "0.5"
          memory: 0.5Gi
        requests:
          cpu: "0.5"
          memory: 0.5Gi
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
    - name: valkey
      serviceVersion: "8.1.3"
      disableExporter: false
      replicas: 3
      resources:
        limits:
          cpu: "0.5"
          memory: 0.5Gi
        requests:
          cpu: "0.5"
          memory: 0.5Gi
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
