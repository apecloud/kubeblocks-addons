apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: valkey-tls
  namespace: demo
spec:
  terminationPolicy: Delete
  clusterDef: valkey
  topology: replication-9
  componentSpecs:
    - name: valkey-sentinel
      serviceVersion: "9.0.0"
      replicas: 3
      tls: true
      issuer:
        name: KubeBlocks
      resources:
        limits:
          cpu: "0.5"
          memory: 0.5Gi
        requests:
          cpu: "0.5"
          memory: 0.5Gi
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
    - name: valkey
      serviceVersion: "9.0.0"
      disableExporter: false
      replicas: 3
      tls: true
      issuer:
        name: KubeBlocks
      resources:
        limits:
          cpu: "0.5"
          memory: 0.5Gi
        requests:
          cpu: "0.5"
          memory: 0.5Gi
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
