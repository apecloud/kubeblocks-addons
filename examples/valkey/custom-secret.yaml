apiVersion: v1
kind: Secret
metadata:
  name: valkey-custom-account
  namespace: demo
type: Opaque
stringData:
  username: default
  password: replace-with-a-strong-password
---
apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: valkey-custom-secret
  namespace: demo
spec:
  terminationPolicy: Delete
  clusterDef: valkey
  topology: replication-9
  componentSpecs:
    - name: valkey-sentinel
      serviceVersion: "9.0.0"
      replicas: 3
      systemAccounts:
        - name: default
          secretRef:
            name: valkey-custom-account
            namespace: demo
      resources:
        limits:
          cpu: "0.5"
          memory: 0.5Gi
        requests:
          cpu: "0.5"
          memory: 0.5Gi
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
    - name: valkey
      serviceVersion: "9.0.0"
      replicas: 3
      systemAccounts:
        - name: default
          secretRef:
            name: valkey-custom-account
            namespace: demo
      resources:
        limits:
          cpu: "0.5"
          memory: 0.5Gi
        requests:
          cpu: "0.5"
          memory: 0.5Gi
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
