apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: valkey-replication-restore
  namespace: demo
spec:
  restore:
    source:
      apiGroup: dataprotection.kubeblocks.io
      kind: Backup
      name: valkey-backup-datafile
      namespace: demo
    parameters:
      dataprotection.kubeblocks.io/source-target-name: valkey
      dataprotection.kubeblocks.io/volume-restore-policy: Parallel
  terminationPolicy: Delete
  clusterDef: valkey
  topology: replication-9
  componentSpecs:
    - name: valkey-sentinel
      serviceVersion: "9.0.0"
      replicas: 3
      resources:
        limits:
          cpu: "0.5"
          memory: 0.5Gi
        requests:
          cpu: "0.5"
          memory: 0.5Gi
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
    - name: valkey
      serviceVersion: "9.0.0"
      disableExporter: false
      replicas: 3
      resources:
        limits:
          cpu: "0.5"
          memory: 0.5Gi
        requests:
          cpu: "0.5"
          memory: 0.5Gi
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
