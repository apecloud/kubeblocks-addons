name: ShellSpec Test PR Review

on:
  pull_request_review:
    types: [submitted]


jobs:
  shellspec-test-pr:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install helm
        uses: azure/setup-helm@v4
      - name: shellspec test
        run: |
          make scripts-test
