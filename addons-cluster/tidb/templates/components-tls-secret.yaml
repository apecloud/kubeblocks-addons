{{- if .Values.extra.enableTLSBetweenComponents }}
{{- $ca := genCA "KubeBlocks" 36500 }}
{{- $pdDomain := printf "%s-tidb-pd-headless.%s.svc.cluster.local" ( include "kblib.clusterName" . ) .Release.Namespace }}
{{- $pdDomain2 := printf "%s-tidb-pd.%s.svc.cluster.local" ( include "kblib.clusterName" . ) .Release.Namespace }}
{{- $pdWildcardDomain := printf "*.%s" $pdDomain}}
{{- $tikvDomain := printf "%s-tikv-headless.%s.svc.cluster.local" ( include "kblib.clusterName" . ) .Release.Namespace }}
{{- $tikvWildcardDomain := printf "*.%s" $tikvDomain}}
{{- $tidbDomain := printf "%s-tidb-headless.%s.svc.cluster.local" ( include "kblib.clusterName" . ) .Release.Namespace }}
{{- $tidbWildcardDomain := printf "*.%s" $tidbDomain}}
{{- $cert := genSignedCert ( include "kblib.clusterName" . ) (list "127.0.0.1" "::1") (list "localhost" $pdDomain $pdWildcardDomain $pdDomain2 $tikvDomain $tikvWildcardDomain $tidbDomain $tidbWildcardDomain) 36500 $ca }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tidb-cluster.TLSBetweenComponentsSecretName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "tidb-cluster.labels" . | nindent 4 }}
type: Opaque
stringData:
  ca.pem: {{ $ca.Cert | quote }}
  cert.pem: {{ $cert.Cert | quote }}
  key.pem: {{ $cert.Key | quote }}
{{- end }}