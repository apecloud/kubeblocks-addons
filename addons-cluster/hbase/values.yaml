# HBase Configuration
nameOverride: ""
fullnameOverride: ""

# Replicas for each component
replicas:
  hmaster: 2
  hregionserver: 2

# Resource requirements for each component
resources:
  hmaster:
    requests:
      cpu: "0.1"
      memory: 0.5Gi
    limits:
      cpu: "1"
      memory: 2Gi
  hregionserver:
    requests:
      cpu: "0.1"
      memory: 0.5Gi
    limits:
      cpu: "1"
      memory: 2Gi

# Storage requirements for each component
storage:
  hbaseLog: 2Gi
  hbaseTempData: 10Gi
  storageClassName: "local-path"

# Service references for external dependencies
serviceRefs:
  hbaseZookeeper:
    namespace: default
    clusterServiceSelector:
      cluster: zkcluster
      service:
        component: zookeeper
        service: headless
        port: client
  hadoopNamenode:
    namespace: default
    clusterServiceSelector:
      cluster: hdfscluster
      service:
        component: namenode
        service: headless
        port: client

# Hadoop cluster name (required for HDFS root path)
hadoopClusterName: hdfscluster

extra:
  terminationPolicy: Delete