{{- $isCluster := eq .Values.topology "cluster" }}
{{- $isStandalone := eq .Values.topology "standalone" }}
{{- if not (or $isCluster $isStandalone) }}
{{- fail "topology must be either 'cluster' or 'standalone'" }}
{{- end }}
{{- include "hbase-cluster.clusterCommon" . }}
  clusterDef: hbase
  topology: {{ .Values.topology }}
  componentSpecs:
{{- if $isCluster }}
    - name: hmaster
      componentDef: hbase-hmaster-2.5
      serviceVersion: 2.5.6
      replicas: {{ .Values.replicas.hmaster }}
      serviceRefs:
        - name: hbase-zookeeper
          namespace: {{ .Values.serviceRefs.hbaseZookeeper.namespace }}
          clusterServiceSelector:
            cluster: {{ .Values.serviceRefs.hbaseZookeeper.clusterServiceSelector.cluster }}
            service:
              component: {{ .Values.serviceRefs.hbaseZookeeper.clusterServiceSelector.service.component }}
              service: {{ .Values.serviceRefs.hbaseZookeeper.clusterServiceSelector.service.service }}
              port: {{ .Values.serviceRefs.hbaseZookeeper.clusterServiceSelector.service.port }}
        - name: hdfs-namenode
          namespace: {{ .Values.serviceRefs.hdfsNamenode.namespace }}
          clusterServiceSelector:
            cluster: {{ .Values.serviceRefs.hdfsNamenode.clusterServiceSelector.cluster }}
            service:
              component: {{ .Values.serviceRefs.hdfsNamenode.clusterServiceSelector.service.component }}
              service: {{ .Values.serviceRefs.hdfsNamenode.clusterServiceSelector.service.service }}
              port: {{ .Values.serviceRefs.hdfsNamenode.clusterServiceSelector.service.port }}
      configs:
        - name: hbase-config
          variables:
            HDFS_NAMESERVICE: {{ .Values.serviceRefs.hdfsNamenode.clusterServiceSelector.cluster | quote }}
            HDFS_NAMENODE_NODES: {{ .Values.hdfs.namenodeNodes | quote }}
            HDFS_NAMENODE_RPC_PORT: {{ .Values.hdfs.namenodeRpcPort | quote }}
            HDFS_NAMENODE_HTTP_PORT: {{ .Values.hdfs.namenodeHttpPort | quote }}
            HDFS_HA_ZK_PARENT: {{ .Values.hdfs.haZkParent | quote }}
            HDFS_REPLICATION: {{ .Values.hdfs.replication | quote }}
      resources:
        requests:
          cpu: {{ .Values.resources.hmaster.requests.cpu | quote }}
          memory: {{ .Values.resources.hmaster.requests.memory }}
        limits:
          cpu: {{ .Values.resources.hmaster.limits.cpu | quote }}
          memory: {{ .Values.resources.hmaster.limits.memory }}
      schedulingPolicy:
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                apps.kubeblocks.io/component-name: hmaster
    - name: hregionserver
      componentDef: hbase-hregionserver-2.5
      serviceVersion: 2.5.6
      replicas: {{ .Values.replicas.hregionserver }}
      serviceRefs:
        - name: hbase-zookeeper
          namespace: {{ .Values.serviceRefs.hbaseZookeeper.namespace }}
          clusterServiceSelector:
            cluster: {{ .Values.serviceRefs.hbaseZookeeper.clusterServiceSelector.cluster }}
            service:
              component: {{ .Values.serviceRefs.hbaseZookeeper.clusterServiceSelector.service.component }}
              service: {{ .Values.serviceRefs.hbaseZookeeper.clusterServiceSelector.service.service }}
              port: {{ .Values.serviceRefs.hbaseZookeeper.clusterServiceSelector.service.port }}
        - name: hdfs-namenode
          namespace: {{ .Values.serviceRefs.hdfsNamenode.namespace }}
          clusterServiceSelector:
            cluster: {{ .Values.serviceRefs.hdfsNamenode.clusterServiceSelector.cluster }}
            service:
              component: {{ .Values.serviceRefs.hdfsNamenode.clusterServiceSelector.service.component }}
              service: {{ .Values.serviceRefs.hdfsNamenode.clusterServiceSelector.service.service }}
              port: {{ .Values.serviceRefs.hdfsNamenode.clusterServiceSelector.service.port }}
      configs:
        - name: hbase-config
          variables:
            HDFS_NAMESERVICE: {{ .Values.serviceRefs.hdfsNamenode.clusterServiceSelector.cluster | quote }}
            HDFS_NAMENODE_NODES: {{ .Values.hdfs.namenodeNodes | quote }}
            HDFS_NAMENODE_RPC_PORT: {{ .Values.hdfs.namenodeRpcPort | quote }}
            HDFS_NAMENODE_HTTP_PORT: {{ .Values.hdfs.namenodeHttpPort | quote }}
            HDFS_HA_ZK_PARENT: {{ .Values.hdfs.haZkParent | quote }}
            HDFS_REPLICATION: {{ .Values.hdfs.replication | quote }}
      resources:
        requests:
          cpu: {{ .Values.resources.hregionserver.requests.cpu | quote }}
          memory: {{ .Values.resources.hregionserver.requests.memory }}
        limits:
          cpu: {{ .Values.resources.hregionserver.limits.cpu | quote }}
          memory: {{ .Values.resources.hregionserver.limits.memory }}
      schedulingPolicy:
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                apps.kubeblocks.io/component-name: hregionserver
{{- else }}
    - name: hbase-standalone
      componentDef: hbase-standalone-2.5
      serviceVersion: 2.5.6
      replicas: 1
      serviceRefs:
        - name: hbase-zookeeper
          namespace: {{ .Values.serviceRefs.hbaseZookeeper.namespace }}
          clusterServiceSelector:
            cluster: {{ .Values.serviceRefs.hbaseZookeeper.clusterServiceSelector.cluster }}
            service:
              component: {{ .Values.serviceRefs.hbaseZookeeper.clusterServiceSelector.service.component }}
              service: {{ .Values.serviceRefs.hbaseZookeeper.clusterServiceSelector.service.service }}
              port: {{ .Values.serviceRefs.hbaseZookeeper.clusterServiceSelector.service.port }}
      resources:
        requests:
          cpu: {{ .Values.resources.hbasestandalone.requests.cpu | quote }}
          memory: {{ .Values.resources.hbasestandalone.requests.memory }}
        limits:
          cpu: {{ .Values.resources.hbasestandalone.limits.cpu | quote }}
          memory: {{ .Values.resources.hbasestandalone.limits.memory }}
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: {{ .Values.storage.standalone.data }}
{{- if .Values.storage.storageClassName }}
            storageClassName: {{ .Values.storage.storageClassName }}
{{- end }}
{{- end }}
