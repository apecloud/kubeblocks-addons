topology: cluster

replicas:
  journalnode: 3
  namenode: 2
  datanode: 3

resources:
  journalnode:
    requests:
      cpu: "500m"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  namenode:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 4Gi
  datanode:
    requests:
      cpu: "500m"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  zkfc:
    requests:
      cpu: "100m"
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi

storage:
  journalnode:
    size: 20Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
  namenode:
    size: 50Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
  datanode:
    size: 100Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce

hdfs:
  core:
    hadoopTmpDir: /hadoop/tmp
  security:
    authentication: simple
    authorization: false
  ports:
    namenode:
      rpc: 8020
      http: 9870
      jmx: 10101
    journalnode:
      rpc: 8485
      http: 8480
      jmx: 10103
    datanode:
      jmx: 10102
    zkfc:
      jmx: 10104
  paths:
    namenodeMetadataDir: /hadoop/dfs/metadata
    datanodeDataDir: /hadoop/dfs/data0
    journalnodeEditsDir: /hadoop/dfs/journal
  replication: 3
  replicationMax: 6
  client:
    replaceDatanodeOnFailurePolicy: DEFAULT
    retryPolicyEnabled: true
    retryPolicySpec: "1000,1"
  permissions:
    enabled: false
    superusergroup: hadoop
  registration:
    ipHostnameCheck: false
  ha:
    nameNodeIds: "nn0,nn1"
    automaticFailoverEnabled: true
    fencingMethods: "sshfence\nshell(/bin/true)"
    fencingSshConnectTimeoutMs: 30000
    zookeeper:
      parentZnodePrefix: /hadoop-ha
      includeClusterUID: true
      sessionTimeoutMs: 60000
      operationRetries: 3
  ipc:
    clientConnectionMaxIdleTimeMs: 300000
    clientConnectTimeoutMs: 20000
    clientConnectionPoolSize: 8
    clientConnectRetryIntervalMs: 1000
    clientPing: true
    pingIntervalMs: 30000
  trash:
    interval: 1440
  jvm:
    namenodeHeapSize: "2g"
    datanodeHeapSize: "1g"
    journalnodeHeapSize: "1g"
    zkfcHeapSize: "256m"
  datanode:
    handlerCount: 64
    failedVolumesTolerated: 0
    duReserved: 1073741824
  namenode:
    handlerCount: 64
    webhdfsEnabled: false
    resourceDuReserved: 1073741824
    haLogRollPeriod: 120
    haTailEditsPeriod: 60
  journalnode:
    enableSync: true
    editCacheSizeBytes: 104857600
    syncIntervalMs: 120000

serviceRefs:
  hadoopZookeeper:
    namespace: kubeblocks
    clusterServiceSelector:
      cluster: zk
      service:
        component: zookeeper
        service: headless
        port: client

prometheus:
  enabled: false

decommission:
  enabled: true
  stateConfigMapName: ""

extra:
  terminationPolicy: Delete
