topology: cluster

replicas:
  core: 1
  journalnode: 3
  namenode: 2
  datanode: 3

resources:
  core:
    requests:
      cpu: "100m"
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 1Gi
  journalnode:
    requests:
      cpu: "500m"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  namenode:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 4Gi
  datanode:
    requests:
      cpu: "500m"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  zkfc:
    requests:
      cpu: "100m"
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi

storage:
  journalnode:
    size: 20Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
  namenode:
    size: 50Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
  datanode:
    size: 100Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce

hdfs:
  ports:
    namenode:
      rpc: 8020
      http: 9870
    journalnode:
      rpc: 8485
      http: 8480
  paths:
    namenodeMetadataDir: /hadoop/dfs/metadata
    datanodeDataDir: /hadoop/dfs/data0
    journalnodeEditsDir: /hadoop/dfs/journal
  replication: 3
  client:
    replaceDatanodeOnFailurePolicy: DEFAULT
  permissions:
    enabled: false
  registration:
    ipHostnameCheck: false
  ha:
    automaticFailoverEnabled: true
    fencingMethods: "sshfence\nshell(/bin/true)"
    zookeeper:
      parentZnodePrefix: /hadoop-ha
      includeClusterUID: true
      sessionTimeoutMs: 60000
      operationRetries: 3
  ipc:
    clientConnectionMaxIdleTimeMs: 300000
    clientConnectTimeoutMs: 20000
    clientConnectionPoolSize: 8
    clientConnectRetryIntervalMs: 1000
    clientPing: true
    pingIntervalMs: 30000
  trash:
    interval: 1440
  jvm:
    namenodeHeapSize: "2g"
    datanodeHeapSize: "1g"
    journalnodeHeapSize: "1g"
    zkfcHeapSize: "256m"
  datanode:
    handlerCount: 64
  namenode:
    handlerCount: 64

serviceRefs:
  hadoopZookeeper:
    namespace: kubeblocks
    clusterServiceSelector:
      cluster: zk
      service:
        component: zookeeper
        service: headless
        port: client

extra:
  terminationPolicy: Delete
