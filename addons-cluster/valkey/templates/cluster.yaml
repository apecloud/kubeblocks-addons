{{- include "valkey-cluster.clusterCommon" . }}
{{- if eq .Values.mode "cluster" }}
  {{- include "valkey-cluster.validateClusterMode" . }}
  shardings:
    - name: shard
      shards: {{ .Values.cluster.shards }}
      template:
        name: shard
        replicas: {{ .Values.cluster.replicas }}
        serviceVersion: {{ .Values.version | quote }}
        {{- include "valkey-cluster.componentResources" . | nindent 8 }}
        {{- include "valkey-cluster.componentStorages" . | nindent 8 }}
{{- else if eq .Values.mode "replication" }}
  componentSpecs:
  {{- include "valkey-cluster.sentinelComponentSpec" . | nindent 4 }}
  {{- include "valkey-cluster.componentSpec" . | nindent 4 }}
{{- else if eq .Values.mode "standalone" }}
  componentSpecs:
  {{- include "valkey-cluster.componentSpec" . | nindent 4 }}
{{- else }}
  {{- fail (printf "unknown mode %q: must be standalone, replication or cluster" .Values.mode) }}
{{- end }}
